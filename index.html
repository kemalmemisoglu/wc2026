<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>WC 2026 Predictor</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>body{background:#0a1a0a;color:#fff;font-family:sans-serif;padding:20px} .card{background:#111;padding:15px;border-radius:10px;margin-bottom:10px} .btn{background:#4ade80;border:none;padding:10px;width:100%;border-radius:5px;cursor:pointer} .inp{width:100%;padding:8px;margin:5px 0} </style>
</head>
<body>
    <div id="app">
        <div id="login-pg" class="card">
            <h2>Giriş Yap</h2>
            <input id="user-name" class="inp" placeholder="Kullanıcı Adı">
            <button class="btn" onclick="login()">Giriş</button>
            <hr>
            <input id="admin-pass" class="inp" type="password" placeholder="Admin Şifre">
            <button class="btn" style="background:#f87171" onclick="adminLogin()">Admin Gir</button>
        </div>
        <div id="main-pg" style="display:none">
            <h2 id="welcome"></h2>
            <div id="match-list"></div>
        </div>
    </div>

<script>
const CONFIG = {apiKey: "AIzaSyDZSlGkMUe7OEuqShJEzphmexL64YGbhTg", authDomain: "palamuts-wc2026.firebaseapp.com", databaseURL: "https://palamuts-wc2026-default-rtdb.firebaseio.com", projectId: "palamuts-wc2026", appId: "1:755134558744:web:f6a787312a9bc3d0ec896d"};
firebase.initializeApp(CONFIG);
const db = firebase.database();
let user="", matches=[], users={};

function login(){
    user = document.getElementById("user-name").value;
    if(user){ document.getElementById("login-pg").style.display="none"; document.getElementById("main-pg").style.display="block"; }
}

function adminLogin(){
    if(document.getElementById("admin-pass").value === "8389.Kemal**"){
        isAdmin=true; login();
    } else alert("Yanlış şifre");
}

db.ref("wc26").on("value", snap => {
    const data = snap.val() || {};
    matches = data.matches || [];
    users = data.users || {};
    render();
});

function render(){
    let html = "";
    matches.forEach(m => {
        const isPast = new Date() > new Date(new Date(m.utc).getTime() - 3600000);
        html += `<div class="card">${m.home} vs ${m.away} 
                 ${isPast ? (m.result ? "Skor: "+m.result.home+"-"+m.result.away : "🔒 Kilitli") 
                          : `<input id="h-${m.id}" class="inp" placeholder="Ev"> <input id="a-${m.id}" class="inp" placeholder="Dep"> <button class="btn" onclick="save(${m.id})">Tahmin Et</button>`}
                 </div>`;
    });
    document.getElementById("match-list").innerHTML = html;
}

function save(mid){
    const h = document.getElementById("h-"+mid).value;
    const a = document.getElementById("a-"+mid).value;
    if(!users[user]) users[user]={predictions:{}};
    users[user].predictions[mid] = {home:h, away:a};
    db.ref("wc26/users").set(users);
    alert("Kaydedildi!");
}
</script>
</body>
</html>
